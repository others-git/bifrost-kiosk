name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version label for a manual release'
        required: true
        default: v0.0.0-manual

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Fetch Vosk model
        run: ./scripts/fetch-vosk-model.sh

      - name: Assemble release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="app-release.apk"

          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Signing with the provided release keystore."
            echo "$KEYSTORE_BASE64" | base64 -d > release.jks
          else
            echo "::warning::No SIGNING_KEYSTORE_BASE64 secret — generating an ephemeral key. The APK installs, but updates require the same key. Set the secret for a stable signing identity."
            KEYSTORE_PASSWORD=android
            KEY_ALIAS=kiosk
            KEY_PASSWORD=android
            keytool -genkeypair -v -keystore release.jks -keyalg RSA -keysize 2048 \
              -validity 10000 -alias "$KEY_ALIAS" \
              -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" \
              -dname "CN=Bifrost Kiosk, OU=Bifrost, O=theundead.live, C=US"
          fi

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks release.jks --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASSWORD" \
            --out "$OUT" aligned.apk
          "$BUILD_TOOLS/apksigner" verify --print-certs "$OUT"
          rm -f release.jks aligned.apk
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.sign.outputs.apk }}
